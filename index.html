<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bunker Online</title>
    <link rel="icon" href="data:," />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        background: radial-gradient(circle at top, #3b3d42 0%, #242529 58%, #1f2024 100%);
        font-family: "Inter", "Segoe UI", system-ui, -apple-system, sans-serif;
      }
      .fade-in {
        animation: fadeIn 0.35s ease;
      }
      .soft-card {
        border: 1px solid rgba(148, 163, 184, 0.18);
        border-radius: 1.25rem;
        background: linear-gradient(145deg, rgba(17, 24, 39, 0.95), rgba(15, 23, 42, 0.88));
        box-shadow: 0 10px 26px rgba(2, 6, 23, 0.45);
      }
      .chip {
        border-radius: 9999px;
        border: 1px solid rgba(148, 163, 184, 0.25);
        background: rgba(15, 23, 42, 0.72);
      }
      .card-tile {
        border-radius: 1.5rem;
        min-height: 180px;
      }
      .card-aqua {
        background: linear-gradient(145deg, #0891b2, #67e8f9);
        color: #062027;
      }
      .card-violet {
        background: linear-gradient(145deg, #4f46e5, #a5b4fc);
        color: #eef2ff;
      }
      .card-graphite {
        background: linear-gradient(145deg, #111827, #1f2937);
      }
      .glass-panel {
        border-radius: 2.7rem;
        border: 1px solid rgba(226, 232, 240, 0.4);
        background: linear-gradient(160deg, rgba(255, 255, 255, 0.2), rgba(71, 73, 78, 0.55));
        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);
        box-shadow: 0 24px 40px rgba(15, 23, 42, 0.35), inset 0 1px 0 rgba(255, 255, 255, 0.15);
      }
      .glass-input {
        border: 1px solid rgba(229, 231, 235, 0.5);
        border-radius: 9999px;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.12), rgba(107, 114, 128, 0.3));
        box-shadow: inset 0 1px 4px rgba(255, 255, 255, 0.12);
      }
      .glass-btn-dark {
        background: #36383d;
        color: #e5e7eb;
      }
      .glass-btn-orange {
        background: #ff8b44;
        color: #fef3e8;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(6px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>
  <body class="text-slate-100 min-h-screen">
    <div class="max-w-6xl mx-auto px-3 sm:px-6 py-4 sm:py-8">

      <section id="auth" class="glass-panel max-w-3xl mx-auto mt-10 sm:mt-20 p-8 sm:p-14 fade-in">
        <h2 class="text-6xl sm:text-7xl font-extrabold text-[#ff8b44] text-center mb-10 sm:mb-14 tracking-wide">БУНКЕР</h2>
        <div class="max-w-xl mx-auto">
          <label for="nameInput" class="block text-2xl sm:text-3xl text-slate-200 mb-2 uppercase tracking-wide">Введите имя</label>
          <input id="nameInput" class="w-full glass-input text-xl sm:text-2xl text-slate-100 px-7 py-4 focus:outline-none focus:ring-2 focus:ring-[#ff8b44]/60" placeholder="" />
        </div>
        <div class="max-w-xl mx-auto mt-8 sm:mt-10 grid sm:grid-cols-2 gap-4 sm:gap-6">
          <button id="createRoomBtn" class="px-8 py-4 rounded-full text-2xl sm:text-3xl transition hover:brightness-110 glass-btn-dark">Лобби</button>
          <button id="joinRoomBtn" class="px-8 py-4 rounded-full text-2xl sm:text-3xl transition hover:brightness-110 glass-btn-orange">Подключиться</button>
        </div>
        <p id="authInfo" class="text-base sm:text-lg text-slate-300 mt-6 max-w-xl mx-auto"></p>
      </section>

      <section id="joinModal" class="hidden fixed inset-0 bg-slate-950/90 z-50 flex items-center justify-center p-4">
        <div class="w-full max-w-md soft-card p-6">
          <h3 class="text-lg font-semibold mb-3">Подключение к комнате</h3>
          <p class="text-sm text-slate-400 mb-3">Введите ID комнаты от создателя лобби</p>
          <input id="roomInput" class="w-full bg-slate-900 rounded-xl p-3 border border-slate-700 uppercase focus:outline-none focus:ring-2 focus:ring-emerald-500" placeholder="ID комнаты" maxlength="6" />
          <div class="mt-4 flex gap-2 justify-end">
            <button id="closeJoinModalBtn" class="px-4 py-2 rounded-xl bg-slate-700 hover:bg-slate-600 transition">Отмена</button>
            <button id="confirmJoinBtn" class="px-4 py-2 rounded-xl bg-emerald-600 hover:bg-emerald-500 transition">Войти</button>
          </div>
          <p id="joinInfo" class="text-sm text-slate-300 mt-3"></p>
        </div>
      </section>

      <section id="game" class="hidden mt-4 sm:mt-6 fade-in space-y-4 sm:space-y-6">
        <div class="soft-card p-4 sm:p-5">
          <div class="flex flex-wrap gap-2 sm:gap-3 items-center justify-between text-sm">
            <span class="chip px-3 py-1.5">Комната: <b id="roomIdLabel"></b></span>
            <span class="chip px-3 py-1.5">Раунд: <b id="roundLabel">1</b></span>
            <span class="chip px-3 py-1.5">Фаза: <b id="phaseLabel">lobby</b></span>
            <button id="copyRoomBtn" class="px-3 py-2 rounded-xl bg-sky-700 hover:bg-sky-600 transition">Скопировать ID</button>
            <button id="startGameBtn" class="px-3 py-2 rounded-xl bg-orange-600 hover:bg-orange-500 transition">Старт игры</button>
          </div>
          <div class="mt-4 grid sm:grid-cols-3 gap-3 text-sm">
            <div class="chip p-3"><span class="text-slate-400">Катастрофа:</span><br /><span id="disasterLabel">—</span></div>
            <div class="chip p-3"><span class="text-slate-400">Бункер:</span><br /><span id="bunkerLabel">—</span></div>
            <div class="chip p-3"><span class="text-slate-400">Условия:</span><br /><span id="conditionLabel">—</span></div>
          </div>
        </div>

        <div class="grid lg:grid-cols-2 gap-4 sm:gap-6">
          <div class="soft-card p-4">
            <h3 class="font-semibold mb-3 text-xl">Игроки</h3>
            <ul id="playersList" class="space-y-2"></ul>
          </div>

          <div class="soft-card p-4">
            <h3 class="font-semibold mb-3 text-xl">Карточка персонажа</h3>
            <div id="revealCards" class="grid grid-cols-1 sm:grid-cols-2 gap-3"></div>
            <p id="infoLog" class="text-sm text-slate-200 mt-4"></p>
          </div>
        </div>
      </section>
    </div>

    <script>
      const CARD_LABELS = {
        age_gender: "Возраст и пол",
        profession: "Профессия",
        health: "Здоровье",
        body_type: "Телосложение",
        hobby: "Хобби",
        baggage: "Багаж",
        phobia: "Фобии",
        feature: "Особенность",
      };

      const CARD_STYLE = {
        age_gender: "card-violet",
        profession: "card-graphite",
        health: "card-aqua",
        body_type: "card-graphite",
        hobby: "card-violet",
        baggage: "card-aqua",
        phobia: "card-graphite",
        feature: "card-violet",
      };

      const state = {
        ws: null,
        roomId: null,
        name: null,
        players: [],
        me: null,
        ownerId: null,
      };

      const authEl = document.getElementById("auth");
      const authInfo = document.getElementById("authInfo");
      const gameEl = document.getElementById("game");
      const nameInput = document.getElementById("nameInput");
      const roomInput = document.getElementById("roomInput");
      const joinModal = document.getElementById("joinModal");
      const joinInfo = document.getElementById("joinInfo");
      const roomIdLabel = document.getElementById("roomIdLabel");
      const roundLabel = document.getElementById("roundLabel");
      const phaseLabel = document.getElementById("phaseLabel");
      const disasterLabel = document.getElementById("disasterLabel");
      const bunkerLabel = document.getElementById("bunkerLabel");
      const conditionLabel = document.getElementById("conditionLabel");
      const playersList = document.getElementById("playersList");
      const infoLog = document.getElementById("infoLog");
      const startGameBtn = document.getElementById("startGameBtn");
      const revealCards = document.getElementById("revealCards");

      function prettifyCardName(cardKey) {
        return CARD_LABELS[cardKey] || cardKey;
      }

      function renderRevealCards() {
        revealCards.innerHTML = "";
        Object.entries(CARD_LABELS).forEach(([key, label]) => {
          const button = document.createElement("button");
          button.dataset.card = key;
          button.className = `reveal-btn card-tile text-left p-4 border border-slate-500/30 hover:border-cyan-300/70 transition ${CARD_STYLE[key] || "card-graphite"}`;
          button.innerHTML = `<p class="text-xs uppercase opacity-80 mb-2">Карта</p><p class="text-lg font-semibold">${label}</p><p class="mt-4 text-sm opacity-85">Нажмите, чтобы раскрыть</p>`;
          button.addEventListener("click", () => {
            send("reveal_card", { room_id: state.roomId, card: key });
          });
          revealCards.appendChild(button);
        });
      }

      function logInfo(message) {
        console.log(`[INFO] ${message}`);
        infoLog.textContent = message;
        if (!authEl.classList.contains("hidden")) authInfo.textContent = message;
        if (!joinModal.classList.contains("hidden")) joinInfo.textContent = message;
      }

      function logError(message, error = null) {
        console.error(`[ERROR] ${message}`, error || "");
        infoLog.textContent = `Ошибка: ${message}`;
        if (!authEl.classList.contains("hidden")) authInfo.textContent = `Ошибка: ${message}`;
        if (!joinModal.classList.contains("hidden")) joinInfo.textContent = `Ошибка: ${message}`;
      }

      function openJoinModal() {
        joinInfo.textContent = "";
        roomInput.value = "";
        joinModal.classList.remove("hidden");
        roomInput.focus();
      }

      function closeJoinModal() {
        joinModal.classList.add("hidden");
      }

      function validateName() {
        const name = nameInput.value.trim();
        if (!name) {
          logError("Введите имя игрока");
          return null;
        }
        return name;
      }

      function waitForSocketOpen() {
        return new Promise((resolve, reject) => {
          if (!state.ws) return reject(new Error("WebSocket не создан"));
          if (state.ws.readyState === WebSocket.OPEN) return resolve();

          const timeout = setTimeout(() => reject(new Error("Таймаут подключения WebSocket")), 5000);
          state.ws.addEventListener("open", () => {
            clearTimeout(timeout);
            resolve();
          }, { once: true });
          state.ws.addEventListener("error", () => {
            clearTimeout(timeout);
            reject(new Error("Ошибка подключения WebSocket"));
          }, { once: true });
        });
      }

      function connectWS() {
        if (state.ws && [WebSocket.OPEN, WebSocket.CONNECTING].includes(state.ws.readyState)) return;

        const proto = window.location.protocol === "https:" ? "wss" : "ws";
        state.ws = new WebSocket(`${proto}://${window.location.host}/ws`);

        state.ws.onopen = () => {
          console.log("[WS] connected");
          authInfo.textContent = "Соединение установлено";
        };

        state.ws.onclose = () => console.warn("[WS] closed");
        state.ws.onerror = (event) => logError("Проблема с соединением", event);

        state.ws.onmessage = (event) => {
          if (typeof event.data !== "string") return logError("Получено неподдерживаемое сообщение WebSocket");
          const payload = event.data.trim();
          if (!payload) return;

          let msg;
          try {
            msg = JSON.parse(payload);
          } catch (_error) {
            logInfo(`Системное сообщение: ${payload}`);
            return;
          }

          const { event: type, data } = msg;
          console.log("[WS] event", type, data);

          if (type === "error") return logError(data?.message || "Неизвестная ошибка");
          if (type === "room_created") authInfo.textContent = `Комната создана. ID: ${data.room_id}`;

          if (type === "room_update") {
            state.roomId = data.room_id;
            state.players = data.players;
            state.ownerId = data.owner_id;
            roomIdLabel.textContent = data.room_id;
            roundLabel.textContent = data.round;
            phaseLabel.textContent = data.phase;
            disasterLabel.textContent = data.disaster || "—";
            bunkerLabel.textContent = data.bunker || "—";
            conditionLabel.textContent = data.survival_condition || "—";

            const me = state.players.find((p) => p.name === state.name || p.id === state.me);
            if (me) state.me = me.id;

            authEl.classList.add("hidden");
            closeJoinModal();
            gameEl.classList.remove("hidden");
            renderPlayers();
            refreshOwnerControls();
          }

          if (type === "game_started") {
            logInfo("Игра началась! Карты розданы, условия выживания сгенерированы.");
          }

          if (type === "player_updated") {
            logInfo(`Игрок раскрыл ${prettifyCardName(data.card)}: ${data.value}`);
          }

          if (type === "voting_results") {
            logInfo(`Исключён игрок: ${data.eliminated_player_name}`);
          }
        };
      }

      function send(event, data = {}) {
        if (!state.ws || state.ws.readyState !== WebSocket.OPEN) return logError(`Нет соединения для события ${event}`);
        state.ws.send(JSON.stringify({ event, data }));
      }

      function refreshOwnerControls() {
        const isOwner = state.me === state.ownerId;
        startGameBtn.disabled = !isOwner;
        startGameBtn.classList.toggle("opacity-50", !isOwner);
        startGameBtn.title = isOwner ? "Запустить игру" : "Только создатель может запустить";
      }

      function renderPlayers() {
        playersList.innerHTML = "";

        state.players.forEach((player) => {
          const li = document.createElement("li");
          li.className = "p-3 rounded-2xl bg-slate-900/75 border border-slate-700 hover:border-slate-500 transition";

          const isOwner = state.ownerId === state.me;
          const isMe = player.id === state.me;
          const revealedCards = (player.revealed || []).map(prettifyCardName).join(", ") || "-";

          li.innerHTML = `
            <div class="space-y-2">
              <div class="flex items-center justify-between gap-2">
                <div>
                  <p class="font-medium">${player.name} ${isMe ? "(Вы)" : ""} ${player.id === state.ownerId ? "👑" : ""}</p>
                  <p class="text-xs text-slate-400">${player.is_alive ? "Жив" : "Исключён"} · раскрыто: ${revealedCards}</p>
                </div>
                ${!isMe && player.is_alive ? `<button class="vote-btn px-3 py-1 rounded-lg bg-rose-700 hover:bg-rose-600 transition" data-id="${player.id}">Голос</button>` : ""}
              </div>
              ${isOwner && !isMe ? `
                <div class="flex gap-2">
                  <button class="kick-btn px-2 py-1 rounded-lg bg-red-700 hover:bg-red-600 transition text-xs" data-id="${player.id}">Выгнать</button>
                  <button class="rename-btn px-2 py-1 rounded-lg bg-amber-700 hover:bg-amber-600 transition text-xs" data-id="${player.id}" data-name="${player.name}">Переименовать</button>
                </div>` : ""}
            </div>
          `;
          playersList.appendChild(li);
        });

        document.querySelectorAll(".vote-btn").forEach((btn) => {
          btn.addEventListener("click", () => send("vote", { room_id: state.roomId, target_id: btn.dataset.id }));
        });
        document.querySelectorAll(".kick-btn").forEach((btn) => {
          btn.addEventListener("click", () => send("kick_player", { room_id: state.roomId, target_id: btn.dataset.id }));
        });
        document.querySelectorAll(".rename-btn").forEach((btn) => {
          btn.addEventListener("click", () => {
            const newName = prompt("Новое имя игрока", btn.dataset.name || "");
            if (!newName) return;
            send("rename_player", { room_id: state.roomId, target_id: btn.dataset.id, new_name: newName.trim() });
          });
        });
      }

      document.getElementById("createRoomBtn").addEventListener("click", async () => {
        const name = validateName();
        if (!name) return;
        try {
          state.name = name;
          connectWS();
          await waitForSocketOpen();
          send("create_room", { name: state.name });
        } catch (error) {
          logError("Не удалось создать лобби", error);
        }
      });

      async function joinRoomFromModal() {
        const name = validateName();
        if (!name) return;

        const roomId = roomInput.value.trim().toUpperCase();
        if (!roomId) return logError("Введите ID комнаты для подключения");

        try {
          state.name = name;
          connectWS();
          await waitForSocketOpen();
          send("join_room", { name: state.name, room_id: roomId });
        } catch (error) {
          logError("Не удалось подключиться к лобби", error);
        }
      }

      document.getElementById("joinRoomBtn").addEventListener("click", () => {
        const name = validateName();
        if (!name) return;
        openJoinModal();
      });

      document.getElementById("closeJoinModalBtn").addEventListener("click", closeJoinModal);
      document.getElementById("confirmJoinBtn").addEventListener("click", joinRoomFromModal);
      roomInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter") joinRoomFromModal();
      });

      document.getElementById("copyRoomBtn").addEventListener("click", async () => {
        if (!state.roomId) return logError("ID комнаты пока не создан");
        try {
          await navigator.clipboard.writeText(state.roomId);
          logInfo(`ID ${state.roomId} скопирован в буфер обмена`);
        } catch (error) {
          logError("Не получилось скопировать ID", error);
        }
      });

      startGameBtn.addEventListener("click", () => send("start_game", { room_id: state.roomId }));

      renderRevealCards();
    </script>
  </body>
</html>
